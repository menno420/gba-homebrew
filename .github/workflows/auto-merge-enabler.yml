# PR-landing workflow: auto-merge enabler (gba-homebrew copy).
#
# PROVENANCE: installed by owner directive (fleet-manager coordinator
# chat, 2026-07-12T23:00Z — "explicit standing permission to merge all
# PRs ... make sure the same workflows exist here"; recorded at
# fleet-manager HEAD as inbox ORDER 029). Adapted from
# menno420/idea-engine@819a8d5 .github/workflows/auto-merge-enabler.yml
# (the substrate-kit enabler + idea-engine's host customizations).
# HOST-INSTALLED, not kit-generated: if a later `bootstrap.py upgrade
# --wire-enforcement` plants a kit-owned enabler, reconcile with this
# file (re-apply the host adaptations below) rather than keeping two.
#
# Host adaptations vs the idea-engine reference (all guards KEPT):
#   - branch-prefix allowlist = `claude/` (all of the last 12 PR head
#     branches here, #64–#75, are claude/*);
#   - required-check wording = "ROM builds" (this repo's ONE required
#     check, conventions.md rule 16);
#   - refuse-to-arm guard additionally consults CLASSIC branch
#     protection before refusing (the rulesets endpoint alone
#     under-counts on a classic-protection repo; any API error still
#     fails safe to "refuse").
#
# Arms GitHub-native auto-merge (squash) on agent PRs at open, so a
# born-red session PR merges itself the moment the required check goes
# green. INERT unless two repo settings exist (both evidenced live in
# this repo, PLATFORM-LIMITS.md slice-4/5 note, 2026-07-11):
#   1. Settings → General → Pull Requests → "Allow auto-merge" = ON.
#   2. The default branch REQUIRES the 'ROM builds' status check.
# With NO required check, arming would merge a PR INSTANTLY — the
# refuse-to-arm guard below counts required contexts and refuses on
# zero rather than inverting the gate.
#
# CARVE-OUT: label `do-not-automerge` = never armed (job-level check +
# a fresh API re-read to defeat the stale-payload label race). The
# label is advisory routing; the required check going red is the
# enforcement.
name: auto-merge-enabler
on:
  pull_request:
    # `synchronize` (every push to the PR head) re-arms: arming is
    # idempotent and never merges anything itself — the merge stays
    # gated by the required check. This narrows the green-behind
    # stall: a fix-push or `git merge origin/<base>` re-arms on the
    # up-to-date head.
    types: [opened, reopened, ready_for_review, synchronize]
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: auto-merge-enabler-${{ github.event.pull_request.number }}
  cancel-in-progress: false
jobs:
  enable-auto-merge:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      startsWith(github.head_ref, 'claude/') &&
      !contains(github.event.pull_request.labels.*.name, 'do-not-automerge')
    runs-on: ubuntu-latest
    steps:
      - name: Refuse to arm unless the base branch requires status CONTEXTS
        id: rules
        env:
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Count required check CONTEXTS, not rules: a
          # required_status_checks RULE with an empty context list
          # still lets an armed PR merge with nothing to wait for.
          contexts="$(gh api "repos/$GITHUB_REPOSITORY/rules/branches/${{ github.base_ref }}" \
            --jq '[.[] | select(.type == "required_status_checks")
                   | .parameters.required_status_checks // [] | .[].context]' \
            2>/dev/null || echo '[]')"
          count="$(printf '%s' "$contexts" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')"
          echo "required contexts via rulesets ($count): $contexts"
          if [ "$count" = "0" ]; then
            # HOST ADAPTATION (gba-homebrew): the rules/branches
            # endpoint reports ruleset-sourced rules; on a repo whose
            # required check is wired through CLASSIC branch
            # protection it returns zero. Consult the classic endpoint
            # before refusing. Any error (404 = no protection,
            # 403 = token can't read it) falls through to '[]' —
            # count stays 0 and we still refuse: fail-safe.
            classic="$(gh api "repos/$GITHUB_REPOSITORY/branches/${{ github.base_ref }}/protection/required_status_checks" \
              --jq '[.contexts // [] | .[]]' 2>/dev/null || echo '[]')"
            count="$(printf '%s' "$classic" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')"
            echo "required contexts via classic protection ($count): $classic"
          fi
          echo "required=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" = "0" ]; then
            echo "::warning::the base branch requires no status-check CONTEXTS — arming would merge instantly. Refusing to arm; make 'ROM builds' a required check first (conventions.md rule 16)."
          fi
      - name: Re-check the do-not-automerge label FRESH (stale-payload race guard)
        id: label
        if: steps.rules.outputs.required != '0'
        env:
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          # The event payload snapshots labels at PR-open time; an
          # MCP-created PR gets its label in a SECOND call right
          # after create. Wait a grace beat, then re-read labels
          # from the API and refuse to arm if the label is present
          # NOW (the kit #22 incident class).
          sleep 15
          labels="$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/labels" --jq '[.[].name] | join(",")')"
          echo "labels on re-read: $labels"
          case ",$labels," in
            *,do-not-automerge,*)
              echo "do-not-automerge present on re-read — refusing to arm."
              echo "skip=1" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "skip=0" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Skip arming while the PR's own in-diff session card is in-progress
        id: card
        if: steps.rules.outputs.required != '0' && steps.label.outputs.skip == '0'
        env:
          # Arm-at-open race guard (idea-engine PR #80/#81 origin,
          # kept here because gba-homebrew has the SAME born-red card
          # convention, conventions.md rule 10): arming at `opened`
          # squash-merges a green PR fast enough to out-race a
          # multi-commit session — the close-out (card flip + claim
          # clear) then arrives on a merged PR and needs a follow-up
          # PR. A session card ADDED born-red (`**Status:**
          # in-progress`, .sessions/README.md) means "more commits are
          # coming": if this PR's diff adds/modifies a `.sessions/*.md`
          # card whose Status badge still says `in-progress`, SKIP
          # arming (exit green, no arm) — the workflow re-runs on
          # `synchronize`, so the close-out push that flips the card to
          # `complete` arms it then. Card-less PRs (claims, telemetry,
          # heartbeats) arm at open. SECURITY: card paths and contents
          # are PR-controlled — they are read via the API and parsed in
          # Python only, passed as argv/env, NEVER interpolated into
          # this script body (the idea-engine PR #64 env-passing
          # precedent).
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import json, os, re, subprocess, sys, urllib.parse

          repo = os.environ["GITHUB_REPOSITORY"]
          pr = os.environ["PR"]
          head = os.environ["HEAD_SHA"]

          def gh_api(*args):
              # argv-only (never a shell string): PR-controlled values can
              # ride as arguments but can never splice into a command.
              r = subprocess.run(["gh", "api", *args],
                                 capture_output=True, text=True)
              if r.returncode != 0:
                  print(r.stderr, file=sys.stderr)
                  sys.exit(1)  # fail LOUD: an unreadable diff must not arm
              return r.stdout

          def parse_line(line):
              v = json.loads(line)
              return json.loads(v) if isinstance(v, str) else v

          entries = [parse_line(line) for line in gh_api(
              f"repos/{repo}/pulls/{pr}/files?per_page=100",
              "--paginate", "--jq", ".[] | @json").splitlines() if line]
          cards = [e["filename"] for e in entries
                   if e["filename"].startswith(".sessions/")
                   and e["filename"].endswith(".md")
                   and e["filename"] != ".sessions/README.md"
                   and e.get("status") != "removed"]

          in_progress = []
          for path in cards:
              raw = gh_api("-H", "Accept: application/vnd.github.raw+json",
                           f"repos/{repo}/contents/"
                           f"{urllib.parse.quote(path)}?ref={head}")
              m = re.search(r"\*\*Status:\*\*\s*`?([A-Za-z-]+)`?", raw)
              status = m.group(1) if m else "<no Status badge>"
              print(f"card {path} @ {head[:12]}: status={status}")
              if status == "in-progress":
                  in_progress.append(path)

          skip = 1 if in_progress else 0
          if skip:
              print("in-progress session card(s) in this PR's diff — "
                    "refusing to arm; the close-out push that flips the card "
                    "to `complete` re-runs this workflow via `synchronize` "
                    "and arms then: " + ", ".join(in_progress))
          elif cards:
              print("all in-diff session cards are past in-progress — "
                    "arming may proceed.")
          else:
              print("no session card in this PR's diff — "
                    "arming may proceed (the card-less fast-lane class).")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"skip={skip}\n")
          PY
      - name: Enable native auto-merge (squash)
        if: steps.rules.outputs.required != '0' && steps.label.outputs.skip == '0' && steps.card.outputs.skip == '0'
        env:
          # Prefer a PAT so the eventual merge attributes to a real
          # user; GITHUB_TOKEN is the fallback.
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          # Squash head-ref provenance (idea-engine PR #62 card 💡):
          # the default squash subject `<title> (#N)` carries NO branch
          # name, so squash-only history starves history-derived branch
          # surveys. `--body` stamps the source branch into the squash
          # commit body as a `Head-ref:` line. Passed via env, never
          # interpolated into the script (injection-safe).
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if gh pr merge --auto --squash "$PR" --repo "$GITHUB_REPOSITORY" --body "Head-ref: $HEAD_REF"; then
            echo "Auto-merge enabled for PR #$PR — it merges when 'ROM builds' is green."
          else
            echo "::warning::Could not enable auto-merge for PR #$PR. Confirm: (1) 'Allow auto-merge' is ON (Settings → General → Pull Requests), (2) the base branch requires the 'ROM builds' check, (3) the token has Pull requests + Contents write. On a repo shape where GitHub structurally refuses the arm (born-red required checks with no pending window, or PR-required-but-no-CI), REST merge-on-green is the landing path instead — see docs/conventions.md rule 2 / PLATFORM-LIMITS.md."
          fi
