# Heavy check — NOT per-PR (fleet CI-tier standard: per-PR is the <60s "ROM
# builds" gate only). Run on demand to regenerate the boot proof: builds the
# skeleton ROM, boots it headless in mGBA for 300 frames, verifies the frame
# is non-blank, and uploads the PNG as a workflow artifact.
name: headless boot proof
on:
  workflow_dispatch:
jobs:
  headless-boot:
    name: headless boot proof
    runs-on: ubuntu-latest
    env:
      DEVKITPRO: /home/runner/devkitpro
    steps:
      - uses: actions/checkout@v4
      - name: cache toolchain (devkitARM r68 + Butano pin)
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/devkitpro
            third_party/butano
          key: gba-toolchain-${{ runner.os }}-${{ hashFiles('tools/setup-toolchain.sh') }}
      - name: setup toolchain
        run: tools/setup-toolchain.sh
      - name: build skeleton ROM
        run: |
          export DEVKITARM="$DEVKITPRO/devkitARM"
          export PATH="$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH"
          make -C games/skeleton -j"$(nproc)"
      # mgba==0.10.2 ships wheels only up to cp311 (no sdist), so the
      # runner's default newer python resolves "from versions: none" —
      # pin 3.11 to match the wheel (and the in-container recipe).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install mGBA (system libmgba 0.10.x + pinned python binding)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mgba-sdl
          # Pin per docs/capabilities.md: mgba==0.10.2 must match system
          # libmgba 0.10.x — drifting either side breaks the ABI.
          pip install mgba==0.10.2
      - name: boot ROM headless + screenshot
        run: |
          python3 tools/headless-screenshot.py \
            games/skeleton/skeleton.gba boot-proof.png --frames 300
      - uses: actions/upload-artifact@v4
        with:
          name: boot-proof
          path: boot-proof.png

  # Semantic regression for Lumen Drift (docs/ideas/hud-depth-ci-assert):
  # replays the committed session-4 proof script and asserts the HUD/card
  # text via OCR-free glyph matching — "this input script still collects the
  # shards, crosses both cave sections and dies at DEPTH 45". Deliberately
  # in this workflow_dispatch tier, NOT per-PR: the per-PR gate stays the
  # <60s "ROM builds" budget.
  lumen-drift-proof:
    name: lumen drift scripted-run assertions
    runs-on: ubuntu-latest
    env:
      DEVKITPRO: /home/runner/devkitpro
    steps:
      - uses: actions/checkout@v4
      - name: cache toolchain (devkitARM r68 + Butano pin)
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/devkitpro
            third_party/butano
          key: gba-toolchain-${{ runner.os }}-${{ hashFiles('tools/setup-toolchain.sh') }}
      - name: setup toolchain
        run: tools/setup-toolchain.sh
      - name: build lumen-drift ROM
        run: |
          export DEVKITARM="$DEVKITPRO/devkitARM"
          export PATH="$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH"
          make -C games/lumen-drift -j"$(nproc)"
      # Same cp311 wheel pin as the headless-boot job above.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install mGBA (system libmgba 0.10.x + pinned python binding)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mgba-sdl
          pip install mgba==0.10.2
      # Session-5 title screen shifted the whole timeline by a constant +4;
      # session-6 audio+light-window init grew the run-start map-rebake stall
      # by one more frame, so the timeline is the session-4 canonical script
      # at a constant +5 total (START press unchanged at frame 20). Offset
      # re-verified by bisection against the script's own assertions: +5
      # passes everything, +4 and +6 drop the shard grabs. Loop-tick watch
      # (gl_audio_hook[7]) confirms zero further overruns: the lag is
      # constant from frame 25 to the end of the run.
      #
      # Audio evidence (session 6 — screenshots cannot hear): the same replay
      # also watches the in-ROM gl_audio_hook trigger counters and the
      # maxmod mixing buffer (nonzero-word count = a voice is actually being
      # mixed), asserting must-play vs must-be-silent frames. Method:
      # docs/capabilities.md; committed evidence log:
      # docs/proof/session-6-audio-watch-log.csv.
      - name: replay committed proof script + assert text and audio evidence
        run: |
          python3 tools/headless-screenshot.py \
            games/lumen-drift/lumen-drift.gba proof-final.png --frames 1785 \
            --keys 20-24:START \
            --keys 5-225:RIGHT --keys-pattern 25-185:6:2:A \
            --keys 265-565:LEFT --keys-pattern 395-475:4:1:A \
            --keys 625-695:RIGHT --keys 625-652:A --keys 695-723:LEFT \
            --keys 815-860:RIGHT \
            --shot 18:proof-title.png \
            --shot 245:proof-shard.png \
            --shot 501:proof-light-high.png \
            --shot 965:proof-deep.png \
            --shot 1600:proof-light-low.png \
            --require-distinct \
            --assert-text '18:LUMEN DRIFT' \
            --assert-text '18:PRESS START' \
            --assert-text '245:SPARKS 1' \
            --assert-text '565:THE GALLERY' \
            --assert-text '965:THE DEEP' \
            --assert-text '1784:DEPTH 45 - BEST 45' \
            --assert-text '1784:SPARKS 2' \
            --elf games/lumen-drift/lumen-drift.elf \
            --watch hook:gl_audio_hook:4 \
            --watch snd:0x04000084:1 \
            --watch-nonzero mix:maxmod_mixing_buffer:0x420 \
            --assert-watch 15:hook:0:eq:0 \
            --assert-watch 15:mix:0:eq:0 \
            --assert-watch 15:snd:0:eq:128 \
            --assert-watch 30:hook:0:eq:1 \
            --assert-watch 30:mix:0:gt:0 \
            --assert-watch 250:hook:2:eq:1 \
            --assert-watch 250:mix:0:eq:0 \
            --assert-watch 480:hook:2:eq:2 \
            --assert-watch 480:mix:0:gt:0 \
            --assert-watch 640:hook:1:eq:48 \
            --assert-watch 640:mix:0:gt:0 \
            --assert-watch 1710:hook:3:eq:1 \
            --assert-watch 1710:mix:0:gt:0 \
            --assert-watch 1784:hook:1:eq:49 \
            --assert-watch 1784:mix:0:eq:0
      # SRAM persistence (session 5): run 1 boots a factory-fresh savefile
      # (title shows BEST 0), dies at DEPTH 3 (no-input surge death) which
      # writes BEST to SRAM; run 2 is a SEPARATE emulator boot on the same
      # savefile and must show BEST 3 on the title — the best depth survived
      # the power cycle. Session 6 adds isolated audio evidence to run 1:
      # the start confirm is the ONLY sound before the surge death, so the
      # mixer must be voiced at 30, silent again at 100, and voiced by the
      # death sweep at 360 (steady-state text asserts at 399 are unchanged
      # by the +1 timing shift).
      - name: SRAM best-persistence proof (two separate emulator boots)
        run: |
          python3 tools/headless-screenshot.py \
            games/lumen-drift/lumen-drift.gba proof-sram-run1.png \
            --frames 400 --savefile proof.sav --keys 20-24:START \
            --assert-text '18:BEST 0' \
            --assert-text '399:THE LIGHT IS TAKEN' \
            --assert-text '399:DEPTH 3 - BEST 3' \
            --elf games/lumen-drift/lumen-drift.elf \
            --watch hook:gl_audio_hook:4 \
            --watch-nonzero mix:maxmod_mixing_buffer:0x420 \
            --assert-watch 30:hook:0:eq:1 \
            --assert-watch 30:mix:0:gt:0 \
            --assert-watch 100:mix:0:eq:0 \
            --assert-watch 360:hook:3:eq:1 \
            --assert-watch 360:mix:0:gt:0 \
            --assert-watch 399:mix:0:eq:0
          python3 tools/headless-screenshot.py \
            games/lumen-drift/lumen-drift.gba proof-sram-run2.png \
            --frames 60 --savefile proof.sav \
            --assert-text '59:LUMEN DRIFT' \
            --assert-text '59:BEST 3' \
            --assert-text '59:PRESS START'
      - uses: actions/upload-artifact@v4
        with:
          name: lumen-drift-proof
          path: proof-*.png
