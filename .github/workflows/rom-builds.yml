  # Parallel NDS job #2 (Brineward arc — slice 2 walking skeleton).
  # Deliberately a SEPARATE job shaped exactly like nds-rom-build so the
  # Gloamline job, its proofs, and the required GBA "ROM builds" gate are
  # untouched (concept-doc rail). Same pinned toolchain + cache key; the
  # host-mirror proof (tools/check-brine.py <-> bw_sim.c lockstep) runs
  # first, then four headless py-desmume proofs against the ROM's
  # bw_telemetry mailbox. Every pinned number below was verified in a
  # deterministic in-container run (the ROM build is byte-deterministic,
  # so drift = regression). Frame mapping: telemetry at tool frame T
  # shows T-A completed duel steps for a START press spanning [A, A+5);
  # a key held at tool frame T drives duel frame T-(A+1); seed = A-2.
  nds-brineward-build:
    name: NDS Brineward build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Host-side proof first (stdlib-only, <5s): the check-brine.py
      # mirror of games/brineward-nds/source/bw_sim.c proves sine-table
      # identities, spawn determinism/safe-distance (4096 seeds), the
      # duel converges BOTH ways (idle player always sunk; the recorded
      # policy always wins), and 20k-frame adversarial containment.
      - name: Brineward host proof (bw_sim mirror)
        run: python3 tools/check-brine.py
      # The duel-win route must be a fresh recording of the checked-in
      # policy: re-derive it and fail if the committed route drifted.
      - name: duel-win route recorder is in sync with the committed route
        run: |
          python3 games/brineward-nds/tools/record-duel-win.py \
            --out /tmp/duel-win-keys.txt
          diff /tmp/duel-win-keys.txt games/brineward-nds/proof/duel-win-keys.txt
      - name: make /opt/wonderful runner-writable
        run: sudo mkdir -p /opt/wonderful && sudo chown "$(id -u):$(id -g)" /opt/wonderful
      - name: cache NDS toolchain (BlocksDS 1.21.1 + Wonderful GCC pins)
        uses: actions/cache@v4
        with:
          path: /opt/wonderful
          key: nds-toolchain-${{ runner.os }}-${{ hashFiles('tools/setup-nds-toolchain.sh') }}
      - name: setup NDS toolchain (idempotent; skips on warm cache)
        run: tools/setup-nds-toolchain.sh
      - name: build brineward-nds ROM
        run: |
          make -C games/brineward-nds -j"$(nproc)"
          test -f games/brineward-nds/brineward-nds.nds
          ls -la games/brineward-nds/brineward-nds.nds
      - name: log ROM sha256 (build provenance; cross-check vs committed dist/)
        run: |
          sha256sum games/brineward-nds/brineward-nds.nds dist/brineward.nds | tee brineward-sha256.txt
      - name: install headless DeSmuME (py-desmume)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends libgl1
          pip install py-desmume==0.0.9
      # Proof 1 — boot: dual-screen title renders, telemetry mailbox is
      # live (magic words 'BRIN' 'WARD', frame counter running, title
      # state holds without input).
      - name: 'proof 1/4 — boot + telemetry mailbox'
        run: |
          python3 tools/nds-headless-check.py \
            games/brineward-nds/brineward-nds.nds bw-boot-300.png \
            --frames 300 --shot 150:bw-boot-150.png \
            --elf games/brineward-nds/build/brineward-nds.elf \
            --watch t:bw_telemetry:16 \
            --assert-watch 250:t:0:eq:0x4252494E \
            --assert-watch 250:t:1:eq:0x57415244 \
            --assert-watch 250:t:3:eq:0 \
            --assert-watch 250:t:2:ge:200
      # Proof 2 — momentum sailing: START latches seed 118; the sloop
      # makes way north at half sail (exact fixed-point positions), a
      # 100-frame RIGHT span turns exactly 400 heading units, UP/DOWN
      # edges walk the trim full -> battle, momentum eases the speed
      # (positions pinned from the mirror sim, matched to the unit).
      - name: 'proof 2/4 — sail kinematics (heading/trim/momentum exact)'
        run: |
          python3 tools/nds-headless-check.py \
            games/brineward-nds/brineward-nds.nds bw-sail.png \
            --frames 400 --keys 120-125:START --keys 180-280:RIGHT \
            --keys 300-302:UP --keys 330-332:DOWN --keys 340-342:DOWN \
            --shot 250:bw-sail-mid.png \
            --elf games/brineward-nds/build/brineward-nds.elf \
            --watch t:bw_telemetry:16 \
            --assert-watch 135:t:3:eq:1 \
            --assert-watch 135:t:13:eq:118 \
            --assert-watch 179:t:4:eq:32768 \
            --assert-watch 179:t:5:eq:26400 \
            --assert-watch 179:t:6:eq:0 \
            --assert-watch 179:t:15:eq:1 \
            --assert-watch 280:t:4:eq:44438 \
            --assert-watch 280:t:5:eq:22483 \
            --assert-watch 280:t:6:eq:400 \
            --assert-watch 320:t:4:eq:48765 \
            --assert-watch 320:t:5:eq:27766 \
            --assert-watch 320:t:15:eq:2 \
            --assert-watch 350:t:4:eq:52588 \
            --assert-watch 350:t:5:eq:32442 \
            --assert-watch 350:t:15:eq:0 \
            --assert-watch 380:t:4:eq:55364 \
            --assert-watch 380:t:5:eq:35839 \
            --assert-watch 380:t:6:eq:400
      # Proof 3 — duel resolves, LOSS side: an idle player is raked down
      # (hull 100 -> 71 -> 42 -> 0, the enemy unscratched), the sunk
      # card holds, and START restarts instantly (fresh seed 1198, full
      # hull, sinks tally persists).
      - name: 'proof 3/4 — idle player sunk, card, instant restart'
        run: |
          python3 tools/nds-headless-check.py \
            games/brineward-nds/brineward-nds.nds bw-loss.png \
            --frames 1260 --keys 120-125:START --keys 1200-1205:START \
            --shot 1160:bw-sunk-card.png \
            --elf games/brineward-nds/build/brineward-nds.elf \
            --watch t:bw_telemetry:16 \
            --assert-watch 135:t:3:eq:1 \
            --assert-watch 135:t:13:eq:118 \
            --assert-watch 220:t:4:eq:32768 \
            --assert-watch 220:t:5:eq:19840 \
            --assert-watch 220:t:7:eq:100 \
            --assert-watch 420:t:5:eq:8192 \
            --assert-watch 420:t:7:eq:71 \
            --assert-watch 720:t:7:eq:42 \
            --assert-watch 720:t:10:eq:100 \
            --assert-watch 1160:t:3:eq:2 \
            --assert-watch 1160:t:7:eq:0 \
            --assert-watch 1160:t:10:eq:100 \
            --assert-watch 1160:t:11:eq:1 \
            --assert-watch 1160:t:12:eq:0 \
            --assert-watch 1215:t:3:eq:1 \
            --assert-watch 1215:t:13:eq:1198 \
            --assert-watch 1215:t:7:eq:100 \
            --assert-watch 1215:t:11:eq:1
      # Proof 4 — duel resolves, WIN side: the recorded beam-holding
      # route (games/brineward-nds/proof/duel-win-keys.txt, wins at every
      # alignment shift in [-6,+6] in the mirror) sinks the rum-runner in
      # 213 duel frames with the player hull UNTOUCHED (mid-duel position
      # + enemy hull 58 matched to the unit), the victory card holds, and
      # START starts the next duel (fresh seed 378, wins tally persists).
      - name: 'proof 4/4 — recorded route WINS the duel, next duel starts'
        run: |
          python3 tools/nds-headless-check.py \
            games/brineward-nds/brineward-nds.nds bw-win.png \
            --frames 420 $(cat games/brineward-nds/proof/duel-win-keys.txt) \
            --keys 380-385:START \
            --shot 300:bw-win-duel.png --shot 360:bw-victory-card.png \
            --elf games/brineward-nds/build/brineward-nds.elf \
            --watch t:bw_telemetry:16 \
            --assert-watch 135:t:3:eq:1 \
            --assert-watch 135:t:13:eq:126 \
            --assert-watch 229:t:4:eq:27116 \
            --assert-watch 229:t:5:eq:20718 \
            --assert-watch 229:t:6:eq:940 \
            --assert-watch 229:t:7:eq:100 \
            --assert-watch 229:t:10:eq:58 \
            --assert-watch 350:t:3:eq:3 \
            --assert-watch 350:t:7:eq:100 \
            --assert-watch 350:t:10:eq:0 \
            --assert-watch 350:t:12:eq:1 \
            --assert-watch 350:t:11:eq:0 \
            --assert-watch 390:t:3:eq:1 \
            --assert-watch 390:t:13:eq:378 \
            --assert-watch 390:t:7:eq:100 \
            --assert-watch 390:t:10:eq:100 \
            --assert-watch 390:t:12:eq:1
      - name: upload Brineward ROM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nds-brineward-${{ github.sha }}
          path: |
            games/brineward-nds/brineward-nds.nds
            brineward-sha256.txt
            bw-boot-300.png
            bw-boot-150.png
            bw-sail.png
            bw-sail-mid.png
            bw-loss.png
            bw-sunk-card.png
            bw-win.png
            bw-win-duel.png
            bw-victory-card.png
          if-no-files-found: error
          retention-days: 14
