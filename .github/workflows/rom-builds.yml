  # slice-3 loot/gold economy).
  # Deliberately a SEPARATE job shaped exactly like nds-rom-build so the
  # Gloamline job, its proofs, and the required GBA "ROM builds" gate are
  # untouched (concept-doc rail). Same pinned toolchain + cache key; the
  # host-mirror proof (tools/check-brine.py <-> bw_sim.c lockstep) runs
  # first, then ten headless py-desmume proofs against the ROM's
  # bw_telemetry mailbox (EXTENDED 20 -> 26 words in slice 4; words 0-19
  # are unchanged, so proofs 1-4 carry their pins verbatim; proofs 5-6
  # carry every pin EXCEPT the player-hull words the slice-4 hull-carry
  # rule deliberately changes — putting out from salvage now keeps the
  # damage, so t[7] rides at 47 where it used to refit to 100, and the
  # proof-6 idle sink lands ~500 frames earlier; both re-derived from
  # the mirror model and matched by the emulator exactly).
  # Every pinned number below was verified in a deterministic
  # in-container run (the ROM build is byte-deterministic, so drift =
  # regression). Frame mapping: telemetry at tool frame T shows T-A
  # completed duel steps for a START press spanning [A, A+5); a key held
  # at tool frame T drives duel frame T-(A+1); seed = A-2. The salvage
  # phase continues the same step counter, and the PORT state (slice 4)
  # freezes the water entirely, so the law carries unchanged.
  nds-brineward-build:
    name: NDS Brineward build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Host-side proof first (stdlib-only, <5s): the check-brine.py
      # mirror of games/brineward-nds/source/bw_sim.c proves sine-table
      # identities, spawn determinism/safe-distance (4096 seeds), the
      # duel converges BOTH ways (idle player always sunk; the recorded
      # policy always wins), 20k-frame adversarial containment, the
      # slice-3 loot rails (loot drop / salvage policy / hold cap / pier
      # window / salvage containment), and the slice-4 port rails:
      # tier-0 tables ARE the slice-2 sloop (the recorded-route guard),
      # the port ledger's exact prices/refusals/repair math for every
      # reachable hull at every tier, upgraded duels still converge both
      # ways, containment at max tiers with the raised speed cap.
      - name: Brineward host proof (bw_sim mirror)
        run: python3 tools/check-brine.py
      # Committed routes must be fresh recordings of the checked-in
      # policies: re-derive them and fail if anything drifted.
      - name: route recorders are in sync with the committed routes
        run: |
          python3 games/brineward-nds/tools/record-duel-win.py \
            --out /tmp/duel-win-keys.txt
          diff /tmp/duel-win-keys.txt games/brineward-nds/proof/duel-win-keys.txt
          mkdir -p /tmp/salvage
          python3 games/brineward-nds/tools/record-salvage.py \
            --outdir /tmp/salvage
          diff /tmp/salvage/salvage-duel-keys.txt games/brineward-nds/proof/salvage-duel-keys.txt
          diff /tmp/salvage/salvage-scoop-keys.txt games/brineward-nds/proof/salvage-scoop-keys.txt
          diff /tmp/salvage/salvage-bank-keys.txt games/brineward-nds/proof/salvage-bank-keys.txt
      - name: make /opt/wonderful runner-writable
        run: sudo mkdir -p /opt/wonderful && sudo chown "$(id -u):$(id -g)" /opt/wonderful
      - name: cache NDS toolchain (BlocksDS 1.21.1 + Wonderful GCC pins)
        uses: actions/cache@v4
        with:
          path: /opt/wonderful
          key: nds-toolchain-${{ runner.os }}-${{ hashFiles('tools/setup-nds-toolchain.sh') }}
      - name: setup NDS toolchain (idempotent; skips on warm cache)
        run: tools/setup-nds-toolchain.sh
      - name: build brineward-nds ROM
        run: |
          make -C games/brineward-nds -j"$(nproc)"
          test -f games/brineward-nds/brineward-nds.nds
          ls -la games/brineward-nds/brineward-nds.nds
      - name: log ROM sha256 (build provenance; cross-check vs committed dist/)
        run: |
          sha256sum games/brineward-nds/brineward-nds.nds dist/brineward.nds | tee brineward-sha256.txt
      - name: install headless DeSmuME (py-desmume)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends libgl1
          pip install py-desmume==0.0.9
