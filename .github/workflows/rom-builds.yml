# Tier-1 fast-full gate (conventions rule 16): ONE required check, "ROM
# builds", compiling the track's ROM per PR. Budget <60s warm — the toolchain
# (~400MB devkitARM + ~120MB Butano) is cached; the skeleton ROM itself
# builds in ~12-18s. Heavier checks (headless boot screenshot) are NOT per-PR
# — see headless-boot.yml (workflow_dispatch only).
name: ROM builds
on:
  pull_request:
  push:
    branches: [main]
jobs:
  rom-builds:
    name: ROM builds
    runs-on: ubuntu-latest
    env:
      # Install under $HOME so actions/cache can restore without sudo
      # (the setup script honours $DEVKITPRO; default is /opt/devkitpro).
      DEVKITPRO: /home/runner/devkitpro
    steps:
      - uses: actions/checkout@v4
      - name: cache toolchain (devkitARM r68 + Butano pin)
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/devkitpro
            third_party/butano
          # The setup script IS the pin manifest — hashing it invalidates the
          # cache exactly when a pin changes.
          key: gba-toolchain-${{ runner.os }}-${{ hashFiles('tools/setup-toolchain.sh') }}
      # Host-side passability proof (review-queue row #23): stdlib-only,
      # <1s — proves every consecutive row pair of the endless cave keeps
      # one crystal-free shared open column (periodicity-verified full
      # coverage). Runs BEFORE the build so a generator regression fails
      # fast. Mirror rule: tools/check-cave.py must move in lockstep with
      # the pure row functions in games/lumen-drift/src/main.cpp.
      - name: cave passability proof (host mirror, review row #23)
        run: python3 tools/check-cave.py
      - name: setup toolchain (idempotent; skips on warm cache)
        run: tools/setup-toolchain.sh
      - name: build ALL game ROMs (games/*/Makefile)
        run: |
          export DEVKITARM="$DEVKITPRO/devkitARM"
          export PATH="$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH"
          built=0
          for dir in games/*/; do
            [ -f "$dir/Makefile" ] || continue
            # NDS games (BlocksDS Makefiles) build in the nds-rom-build job,
            # not with devkitARM/Butano — skip them here. (if-form: a bare
            # `grep && continue` returns 1 on non-NDS Makefiles and trips
            # the runner's errexit.)
            if grep -q 'BLOCKSDS' "$dir/Makefile"; then continue; fi
            make -C "$dir" -j"$(nproc)"
            rom="$dir$(basename "$dir").gba"
            test -f "$rom"
            echo "ROM built: $(ls -la "$rom")"
            built=$((built + 1))
          done
          test "$built" -ge 2 && echo "$built ROMs built"
      - name: log ROM sha256 (build provenance)
        run: sha256sum games/*/*.gba | tee rom-sha256.txt
      - name: upload ROMs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gba-roms-${{ github.sha }}
          path: |
            games/*/*.gba
            rom-sha256.txt
          if-no-files-found: error
          retention-days: 14
  # Parallel NDS job (Gloamline arc — slice 2 laid the toolchain, slice 3 is
  # the walking skeleton). Deliberately a SEPARATE job so the required "ROM
  # builds" GBA gate is untouched: BlocksDS 1.21.1 + Wonderful GCC
  # (sha256-pinned by tools/setup-nds-toolchain.sh, which the cache key
  # hashes), then the host-mirror proof + twenty-eight headless py-desmume proofs
  # against the ROM's gl_telemetry mailbox (ELF-symbol-resolved watches;
  # every numeric value below was pinned from a deterministic in-container
  # run — the ROM build is byte-deterministic, so drift = regression).
  nds-rom-build:
    name: NDS ROM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Host-side proof first (stdlib-only, <1s): the check-gloam.py mirror
      # of games/gloamline-nds/source/gl_sim.c proves spawn determinism /
      # fence-perimeter / safe-radius, monotone-bounded chase convergence,
      # and arena containment for every reachable input. Mirror rule:
      # check-gloam.py moves in lockstep with gl_sim.c, same PR.
      - name: Gloamline host proof (gl_sim mirror)
        run: python3 tools/check-gloam.py
      # The Wonderful packages are prefix-bound to /opt/wonderful (loader
      # paths are patched at install), so make it runner-writable BEFORE the
      # cache step: actions/cache restores without sudo.
      - name: make /opt/wonderful runner-writable
        run: sudo mkdir -p /opt/wonderful && sudo chown "$(id -u):$(id -g)" /opt/wonderful
      - name: cache NDS toolchain (BlocksDS 1.21.1 + Wonderful GCC pins)
        uses: actions/cache@v4
        with:
          path: /opt/wonderful
          # The setup script IS the pin manifest — hashing it invalidates the
          # cache exactly when a pin changes.
          key: nds-toolchain-${{ runner.os }}-${{ hashFiles('tools/setup-nds-toolchain.sh') }}
      - name: setup NDS toolchain (idempotent; skips on warm cache)
        run: tools/setup-nds-toolchain.sh
      # Stress build FIRST (then a clean shipped build, so the shipped .nds
      # is what's on disk for the sha256 log + artifacts): GL_STRESS=1
      # spawns the full 24-Shambler cap at frame 0 with death disarmed and
      # pre-places the full 8-barricade ring (slice 5) — identical
      # sim/render code paths — for the frame-budget proof 7/9.
      - name: build gloamline-nds PERF-STRESS ROM (GL_STRESS=1, CI-only)
        run: |
          make -C games/gloamline-nds GL_STRESS=1 -j"$(nproc)"
          cp games/gloamline-nds/gloamline-nds.nds gloamline-stress.nds
          cp games/gloamline-nds/build/gloamline-nds.elf gloamline-stress.elf
          make -C games/gloamline-nds clean
      - name: build gloamline-nds ROM
        run: |
          make -C games/gloamline-nds -j"$(nproc)"
          test -f games/gloamline-nds/gloamline-nds.nds
          ls -la games/gloamline-nds/gloamline-nds.nds
      - name: log ROM sha256 (build provenance; cross-check vs committed dist/)
        run: |
          sha256sum games/gloamline-nds/gloamline-nds.nds dist/gloamline.nds | tee nds-sha256.txt
      - name: install headless DeSmuME (py-desmume)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends libgl1
          pip install py-desmume==0.0.9
      # Proof 1 — boot: dual-screen title renders, telemetry mailbox is
      # live (magic words present, frame counter running, full-length
      # 3600-frame nights — i.e. the shipped ROM, not a test build).
      - name: 'proof 1/28 — boot + telemetry mailbox'
        run: |
          python3 tools/nds-headless-check.py \
            games/gloamline-nds/gloamline-nds.nds nds-boot-300.png \
            --frames 300 --shot 150:nds-boot-150.png \
            --elf games/gloamline-nds/build/gloamline-nds.elf \
            --watch t:gl_telemetry:16 \
            --assert-watch 250:t:0:eq:0x474C4F41 \
            --assert-watch 250:t:1:eq:0x4D4C4E45 \
            --assert-watch 250:t:3:eq:0 \
            --assert-watch 250:t:2:ge:200 \
            --assert-watch 250:t:15:eq:3600
      # Proof 2 — move: START begins a run (seed = latch frame, pinned 118),
      # then RIGHT / DOWN / UP+LEFT each move the player by the exact
      # pure-function distances (1.5 px/f straight, 271/256 px/f per axis
      # diagonal). Positions are 8.8 fixed (32768 = x128).
      - name: 'proof 2/28 — 8-way move (position telemetry tracks input)'
        run: |
          python3 tools/nds-headless-check.py \
            games/gloamline-nds/gloamline-nds.nds nds-move.png \
            --frames 320 --keys 120-125:START --keys 140-200:RIGHT \
            --keys 210-250:DOWN --keys 260-300:UP --keys 260-300:LEFT \
            --shot 205:nds-yard.png \
            --elf games/gloamline-nds/build/gloamline-nds.elf \
            --watch t:gl_telemetry:16 \
            --assert-watch 130:t:3:eq:1 \
            --assert-watch 130:t:4:eq:32768 \
            --assert-watch 130:t:5:eq:26624 \
            --assert-watch 130:t:12:eq:118 \
            --assert-watch 205:t:4:eq:55808 \
            --assert-watch 205:t:5:eq:26624 \
            --assert-watch 255:t:4:eq:55808 \
            --assert-watch 255:t:5:eq:41984 \
            --assert-watch 305:t:4:eq:44968 \
            --assert-watch 305:t:5:eq:31144
      # Proof 3 — chase + death + instant restart: an idle player is run
      # down (Chebyshev distance t[13] closes 17501 -> 15077 -> contact
      # 2405 < 2560), state flips to DEAD with deaths=1, the card holds,
      # and START restarts instantly (fresh seed 348, player re-centered,
      # the new night's Shambler closing again).
      - name: 'proof 3/28 — chase closes, contact = death, START restarts'
        run: |
          python3 tools/nds-headless-check.py \
            games/gloamline-nds/gloamline-nds.nds nds-death.png \
            --frames 420 --keys 120-125:START --keys 350-355:START \
            --shot 300:nds-deathcard.png \
            --elf games/gloamline-nds/build/gloamline-nds.elf \
            --watch t:gl_telemetry:16 \
            --assert-watch 130:t:13:eq:17501 \
            --assert-watch 150:t:13:eq:15077 \
            --assert-watch 150:t:3:eq:1 \
            --assert-watch 150:t:11:eq:0 \
            --assert-watch 250:t:3:eq:2 \
            --assert-watch 250:t:11:eq:1 \
            --assert-watch 250:t:13:eq:2405 \
            --assert-watch 349:t:3:eq:2 \
            --assert-watch 360:t:3:eq:1 \
            --assert-watch 360:t:11:eq:1 \
            --assert-watch 360:t:12:eq:348 \
            --assert-watch 360:t:4:eq:32768 \
            --assert-watch 360:t:5:eq:26624 \
            --assert-watch 419:t:13:eq:11696
      # Proof 4 — survive to dawn: a mirror-sim-derived kiting route
      # (games/gloamline-nds/proof/dawn-route-keys.txt, survives with
      # >= 22 px of margin at every alignment +-6 frames) replays a FULL
      # 60-second night headlessly (~5 s wall): dawn breaks (state 3),
      # nights survived = 1, deaths = 0.
      - name: 'proof 4/28 — survive night 1 to dawn (full-length night)'
        run: |
          python3 tools/nds-headless-check.py \
            games/gloamline-nds/gloamline-nds.nds nds-dawn.png \
            --frames 3900 $(cat games/gloamline-nds/proof/dawn-route-keys.txt) \
            --shot 3800:nds-dawncard.png \
            --elf games/gloamline-nds/build/gloamline-nds.elf \
            --watch t:gl_telemetry:16 \
            --assert-watch 2000:t:3:eq:1 \
            --assert-watch 2000:t:11:eq:0 \
            --assert-watch 3750:t:3:eq:3 \
            --assert-watch 3750:t:8:eq:0 \
            --assert-watch 3750:t:9:eq:1 \
            --assert-watch 3750:t:10:eq:1 \
            --assert-watch 3750:t:11:eq:0
      # Proof 5 — the SHOVE (slice 4): with the Shambler closing (dist
      # 4517 < the 6144 shove range), A knocks it back exactly +40 px
      # (14757 = 4517 + 10240), stuns it (t[20]) and arms the 90-frame
      # cooldown (t[18]); mashing A during the cooldown does nothing
      # (shoves-connected t[19] stays 1); once the cooldown clears and it
      # closes again, a second shove connects (5541 -> 15781); the valve
      # only DELAYS — the idle player still dies by frame 490. Every
      # value below was predicted by the tools/gloam-route.py mirror sim
      # and matched by the emulator run exactly.
      - name: 'proof 5/28 — shove: knockback + stun + cooldown (pressure valve)'
        run: |
          python3 tools/nds-headless-check.py \
            games/gloamline-nds/gloamline-nds.nds nds-shove.png \
            --frames 500 --keys 120-125:START --keys 232-237:A \
            --keys 260-265:A --keys 345-350:A \
            --shot 233:nds-shove-moment.png \
            --elf games/gloamline-nds/build/gloamline-nds.elf \
            --watch t:gl_telemetry:24 \
            --assert-watch 225:t:18:eq:0 \
            --assert-watch 225:t:19:eq:0 \
            --assert-watch 231:t:13:eq:4517 \
            --assert-watch 233:t:13:eq:14757 \
            --assert-watch 233:t:19:eq:1 \
            --assert-watch 233:t:18:ge:85 \
            --assert-watch 233:t:20:ge:40 \
            --assert-watch 262:t:19:eq:1 \
            --assert-watch 262:t:18:gt:0 \
            --assert-watch 330:t:20:eq:0 \
            --assert-watch 330:t:18:eq:0 \
            --assert-watch 344:t:13:eq:5541 \
            --assert-watch 346:t:19:eq:2 \
            --assert-watch 346:t:13:eq:15781 \
            --assert-watch 490:t:3:eq:2 \
            --assert-watch 490:t:11:eq:1 \
            --assert-watch 490:t:19:eq:2
      # Proof 6 — WAVES + multi-zombie survive: the gloam-route.py-derived
      # route (proof/night2-route-keys.txt — survives every +-6-frame
      # movement skew with >= 21.8 px margin on the mirror) survives night
      # 1 (wave of 1), then night 2's wave of 3 spawns on the pure
      # schedule (alive t[16]: 1 at rf 100, 2 past rf 800, 3 past rf
      # 1600), and dawn breaks on night 2 with 3 Shamblers up and 0
      # deaths. ~10 s wall headless for the two full nights.
      - name: 'proof 6/28 — night-2 wave (3 zombies) spawns on schedule + survive to dawn'
        run: |
          python3 tools/nds-headless-check.py \
            games/gloamline-nds/gloamline-nds.nds nds-night2.png \
            --frames 7600 $(cat games/gloamline-nds/proof/night2-route-keys.txt) \
            --shot 5600:nds-waves-yard.png --shot 7500:nds-dawn2.png \
            --elf games/gloamline-nds/build/gloamline-nds.elf \
            --watch t:gl_telemetry:24 \
            --assert-watch 2000:t:3:eq:1 \
            --assert-watch 2000:t:16:eq:1 \
            --assert-watch 2000:t:17:eq:1 \
            --assert-watch 3750:t:3:eq:3 \
            --assert-watch 3750:t:9:eq:1 \
            --assert-watch 3750:t:10:eq:1 \
            --assert-watch 3900:t:3:eq:1 \
            --assert-watch 3900:t:9:eq:2 \
            --assert-watch 3900:t:16:eq:1 \
            --assert-watch 3900:t:17:eq:3 \
            --assert-watch 4750:t:16:eq:2 \
            --assert-watch 5500:t:16:eq:3 \
            --assert-watch 5500:t:3:eq:1 \
            --assert-watch 7450:t:3:eq:3 \
            --assert-watch 7450:t:10:eq:2 \
            --assert-watch 7450:t:11:eq:0
      # Proof 7 — frame budget with the FULL 24-Shambler cap AND the full
      # 8-barricade ring (stress build): all 24 up at frame 200, the ring
      # pre-placed at night start (all 8 intact at 200, the crowd chews
      # through every one by 990 — barricade block/draw paths are ON the
      # measured frames), nobody dies (death disarmed), and the scanline
      # probe says the worst frame since power-on (t[22], REG_VCOUNT-
      # derived) stays under the 71-line vblank in steady state (t[21];
      # slice-5 measured max 68, mean 56.3 — barricades cost ~4-15 lines
      # over slice 4's 53) and under the 263-line whole-frame budget even
      # on the one night-start console-redraw spike (measured 140) —
      # i.e. 60 fps with the maximum crowd + full ring. Honest-method
      # note: this is DeSmuME's scanline timing model (py-desmume 0.0.9),
      # not hardware.
      - name: 'proof 7/28 — 24-Shambler + 8-barricade frame budget (stress build, vcount probe)'
        run: |
          python3 tools/nds-headless-check.py \
            gloamline-stress.nds nds-stress.png \
            --frames 1000 --keys 120-125:START \
            --shot 400:nds-stress-400.png \
            --elf gloamline-stress.elf \
            --watch t:gl_telemetry:32 \
            --assert-watch 200:t:3:eq:1 \
            --assert-watch 200:t:16:eq:24 \
            --assert-watch 200:t:17:eq:24 \
            --assert-watch 200:t:25:eq:8 \
            --assert-watch 900:t:3:eq:1 \
            --assert-watch 900:t:11:eq:0 \
            --assert-watch 990:t:25:eq:0 \
            --assert-watch 990:t:27:eq:8 \
            --assert-watch 990:t:21:gt:0 \
            --assert-watch 990:t:21:le:71 \
            --assert-watch 990:t:22:lt:263
      # Proof 8 — BARRICADE lifecycle (slice 5), against proof 3 as the
      # control: identical START timing = identical seed 118 and spawn.
      # The idle player places a barricade at their feet (B at 128); the
      # same Shambler that killed the control player by frame 250
      # (proof 3: t[3]=2 at 250) is HELD at the barricade's 16 px ring
      # (dist t[13] pinned 4133 = 16.1 px at 250 AND 400 — still alive),
      # chewing exactly 1 hp per blocked attempt (t[26] pinned 228 at
      # 250, 122 at 400); the barricade breaches (t[25]=0, breach counter
      # t[27]=1 by 600) and the dead get through after all — death by
      # 690 with the unspent planks intact (t[24]=5). Every value was
      # predicted by the tools/gloam-route.py mirror sim and matched by
      # the emulator exactly.
      - name: 'proof 8/28 — barricade: place blocks the dead, chew-through breaches, still no free lunch'
        run: |
          python3 tools/nds-headless-check.py \
            games/gloamline-nds/gloamline-nds.nds nds-barricade.png \
            --frames 700 --keys 120-125:START --keys 128-133:B \
            --shot 250:nds-barricade-hold.png \
            --shot 600:nds-barricade-breach.png \
            --elf games/gloamline-nds/build/gloamline-nds.elf \
            --watch t:gl_telemetry:32 \
            --assert-watch 140:t:24:eq:5 \
            --assert-watch 140:t:25:eq:1 \
            --assert-watch 140:t:26:eq:240 \
            --assert-watch 140:t:28:eq:1 \
            --assert-watch 140:t:30:eq:32768 \
            --assert-watch 140:t:31:eq:26624 \
            --assert-watch 250:t:3:eq:1 \
            --assert-watch 250:t:13:eq:4133 \
            --assert-watch 250:t:26:eq:228 \
            --assert-watch 400:t:3:eq:1 \
            --assert-watch 400:t:13:eq:4133 \
            --assert-watch 400:t:26:eq:122 \
            --assert-watch 600:t:25:eq:0 \
            --assert-watch 600:t:27:eq:1 \
            --assert-watch 690:t:3:eq:2 \
            --assert-watch 690:t:11:eq:1 \
            --assert-watch 690:t:24:eq:5
      # Proof 9 — plank economy: B on a FULL barricade in reach wastes
      # nothing (planks t[24] stay 5, repairs t[29] stay 0 after the B at
      # 150); once chewed to 195 (t[26] at 305), B repairs it to full for
      # exactly 1 plank (t[26] back to 236 = 240 minus the chews since,
      # t[24] 5->4, t[29]=1) and the block keeps holding (alive at 420,
      # chewing resumed: t[26]=155). Mirror-predicted, emulator-matched.
      - name: 'proof 9/28 — barricade repair: 1 plank, full hp, no waste on a full one'
        run: |
          python3 tools/nds-headless-check.py \
            games/gloamline-nds/gloamline-nds.nds nds-repair.png \
            --frames 430 --keys 120-125:START --keys 128-133:B \
            --keys 150-155:B --keys 310-315:B \
            --shot 340:nds-repair-340.png \
            --elf games/gloamline-nds/build/gloamline-nds.elf \
            --watch t:gl_telemetry:32 \
            --assert-watch 145:t:24:eq:5 \
            --assert-watch 145:t:28:eq:1 \
            --assert-watch 145:t:29:eq:0 \
            --assert-watch 145:t:26:eq:240 \
            --assert-watch 160:t:24:eq:5 \
            --assert-watch 160:t:29:eq:0 \
            --assert-watch 305:t:26:eq:195 \
            --assert-watch 305:t:24:eq:5 \
            --assert-watch 315:t:26:eq:236 \
            --assert-watch 315:t:24:eq:4 \
            --assert-watch 315:t:29:eq:1 \
            --assert-watch 340:t:26:eq:217 \
            --assert-watch 420:t:3:eq:1 \
            --assert-watch 420:t:26:eq:155 \
            --assert-watch 420:t:24:eq:4
      # Proof 10 — SCAVENGE loot + early exit (slice 6): the proof-4 dawn
      # route (same seed 118) reaches the dawn card (planks 6, interlude
      # counter 0), SELECT enters the interlude (state 4, 1190 dawn-light
      # frames at the pin, all 5 caches up, planks untouched); the mirror-
      # derived walk pockets 3 caches (planks 6->7 at 3790 ->9 at 3850,
      # scavenged t[34] 1->3, caches t[33] 4->2), then stands ON a 4th
      # cache with the pocket full (t[38] = 1240 < the 3072 pickup range)
      # WITHOUT consuming it (t[33] stays 2 — no cache is ever wasted);
      # START leaves early: night 2 begins with the loot (planks 9 — NOT
      # the flat +2 skip grant's 8), the wave of 3 on schedule, caches
      # wiped, 0 deaths. Route survives every +-6-frame movement skew on
      # the mirror (min dist >= 22.4 px); every pinned value below was
      # mirror-predicted and emulator-matched exactly.
      - name: 'proof 10/28 — scavenge: SELECT enters, 3 caches looted, full pocket wastes nothing, START exits with the loot'
        run: |
          python3 tools/nds-headless-check.py \
            games/gloamline-nds/gloamline-nds.nds nds-scavenge-loot.png \
            --frames 3940 $(cat games/gloamline-nds/proof/scavenge-loot-keys.txt) \
            --shot 3860:nds-scavenge-yard.png \
            --elf games/gloamline-nds/build/gloamline-nds.elf \
            --watch t:gl_telemetry:40 \
            --assert-watch 3750:t:3:eq:3 \
            --assert-watch 3750:t:24:eq:6 \
            --assert-watch 3750:t:9:eq:1 \
            --assert-watch 3750:t:10:eq:1 \
            --assert-watch 3750:t:35:eq:0 \
            --assert-watch 3770:t:3:eq:4 \
            --assert-watch 3770:t:32:eq:1190 \
            --assert-watch 3770:t:33:eq:5 \
            --assert-watch 3770:t:35:eq:1 \
            --assert-watch 3770:t:34:eq:0 \
            --assert-watch 3770:t:24:eq:6 \
            --assert-watch 3790:t:24:eq:7 \
            --assert-watch 3790:t:33:eq:4 \
            --assert-watch 3790:t:34:eq:1 \
            --assert-watch 3850:t:24:eq:9 \
            --assert-watch 3850:t:33:eq:2 \
            --assert-watch 3850:t:34:eq:3 \
            --assert-watch 3880:t:3:eq:4 \
            --assert-watch 3880:t:24:eq:9 \
            --assert-watch 3880:t:33:eq:2 \
            --assert-watch 3880:t:38:eq:1240 \
            --assert-watch 3920:t:3:eq:1 \
            --assert-watch 3920:t:9:eq:2 \
            --assert-watch 3920:t:17:eq:3 \
            --assert-watch 3920:t:24:eq:9 \
            --assert-watch 3920:t:32:eq:0 \
            --assert-watch 3920:t:33:eq:0 \
            --assert-watch 3920:t:34:eq:3 \
            --assert-watch 3920:t:11:eq:0
      # Proof 11 — the interlude is NOT free (slice 6): SELECT recenters
      # the lamplighter on the lamppost (position pinned exactly) and the
      # dawn light returns the night's Shambler to the fence line (dist
      # t[13] = 17366 = 67.8 px — outside the safe radius, no instant
      # death by construction); an IDLE player is then walked down (dist
      # closes 6821 -> 2789) and killed INSIDE the interlude (state 4 ->
      # 2, deaths 1, contact dist 2405 — the same cold hands as proof 3),
      # planks unlooted. Daylight is bought planks, not safety.
      - name: 'proof 11/28 — scavenge risk: the dead walk back in, idling in the interlude kills you'
