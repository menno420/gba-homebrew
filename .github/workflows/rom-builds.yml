      # the faster crew is IN the shipped dynamics, not just on the
      # menu. (Tier III's 4-ball rake is host-proved in check-brine.py;
      # 45g is two more banked wrecks than one proof story holds.)
      - name: 'proof 10/10 — cannons II: battery reloads in 70, not 90'
        run: |
          python3 tools/nds-headless-check.py \
            games/brineward-nds/brineward-nds.nds bw-cannons.png \
            --frames 800 $(cat games/brineward-nds/proof/salvage-duel-keys.txt) \
            $(cat games/brineward-nds/proof/salvage-scoop-keys.txt) \
            $(cat games/brineward-nds/proof/salvage-bank-keys.txt) \
            --keys 650-655:A --keys 670-672:DOWN --keys 690-695:A \
            --keys 710-715:START --keys 730-735:START --keys 790-792:L \
            --shot 793:bw-cannons-fire.png \
            --elf games/brineward-nds/build/brineward-nds.elf \
            --watch t:bw_telemetry:26 \
            --assert-watch 145:t:3:eq:1 \
            --assert-watch 145:t:13:eq:127 \
            --assert-watch 700:t:3:eq:4 \
            --assert-watch 700:t:21:eq:1 \
            --assert-watch 700:t:18:eq:0 \
            --assert-watch 700:t:23:eq:1 \
            --assert-watch 740:t:3:eq:1 \
            --assert-watch 740:t:13:eq:728 \
            --assert-watch 740:t:21:eq:1 \
            --assert-watch 740:t:7:eq:47 \
            --assert-watch 788:t:25:eq:0 \
            --assert-watch 792:t:25:eq:68 \
            --assert-watch 795:t:25:eq:65
