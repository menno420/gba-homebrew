  # Parallel NDS job (Underroot arc — slice 1: dual-screen skeleton). A
  # SEPARATE job so the required "ROM builds" GBA gate is untouched, mirroring
  # nds-rom-build (Gloamline) and nds-brineward-build. BlocksDS 1.21.1 +
  # Wonderful GCC, sha256-pinned by tools/setup-nds-toolchain.sh.
  nds-underroot-build:
    name: NDS Underroot build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Host-side proof first (stdlib-only, <1s): the check-underroot.py
      # mirror of games/underroot-nds/source/ur_sim.c proves the hawk
      # schedule pure/bounded/on-band for 150k (seed,season,frame) cases, the
      # dig grid's touch->cell mapping, idempotent+monotone digging, and
      # burrow-BFS connectivity (isolated pockets never counted), the food
      # patches pure/on-meadow/off-the-lanes, and (slice 3) the forager route:
