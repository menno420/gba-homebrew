  # Parallel NDS job #2 (Brineward arc — slice 5: THE MAW, the first sea
  # monster, on the slice-4 port/upgrades economy).
  # Deliberately a SEPARATE job shaped exactly like nds-rom-build so the
  # Gloamline job, its proofs, and the required GBA "ROM builds" gate are
  # untouched (concept-doc rail). Same pinned toolchain + cache key; the
  # host-mirror proof (tools/check-brine.py <-> bw_sim.c lockstep) runs
  # first, then twelve headless py-desmume proofs against the ROM's
  # bw_telemetry mailbox (EXTENDED 26 -> 31 words in slice 5; words 0-25
  # are unchanged and the Maw steps ONLY in the salvage water, dormant
  # for the first BW_MAW_PATIENCE frames after the sink — every
  # committed story leaves the salvage water long before any stir — so
  # proofs 1-10 carry ALL their slice-4 pins verbatim: ZERO re-pins
  # this slice). Proofs 11-12 are the new Maw stories on their own
  # recorded seed-119 routes (record-maw.py; both stories hold at every
  # alignment shift in [-6,+6] on the mirror — exact literals are
  # unshifted-run pins, session-28 rule).
  # Every pinned number below was verified in a deterministic
  # in-container run (the ROM build is byte-deterministic, so drift =
  # regression) — and the slice-5 mirror model was validated against
  # the emulator over BOTH full Maw stories frame-by-frame first
  # (52,439 telemetry values, zero mismatches). Frame mapping:
  # telemetry at tool frame T shows T-A completed duel steps for a
  # START press spanning [A, A+5); a key held at tool frame T drives
  # duel frame T-(A+1); seed = A-2. The salvage phase continues the
  # same step counter, and the PORT state (slice 4) freezes the water
  # entirely, so the law carries unchanged.
  nds-brineward-build:
    name: NDS Brineward build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Host-side proof first (stdlib-only, <5s): the check-brine.py
      # mirror of games/brineward-nds/source/bw_sim.c proves sine-table
      # identities, spawn determinism/safe-distance (4096 seeds), the
      # duel converges BOTH ways (idle player always sunk; the recorded
      # policy always wins), 20k-frame adversarial containment, the
      # slice-3 loot rails (loot drop / salvage policy / hold cap / pier
      # window / salvage containment — re-armed in slice 5 with the Maw
      # stalking and fire keys live), the slice-4 port rails (tier-0
      # tables ARE the slice-2 sloop, the port ledger exhaustively,
      # upgraded duels converge both ways, max-tier containment), and
      # the slice-5 Maw rails: the whole telegraph contract frame-exact
      # (patience/shadow/surface/lunge dwell times, ONE bite of exactly
      # BW_MAW_BITE per lunge), pier sanctuary (a berthed player is
      # never surfaced on or bitten and the port stays reachable), and
      # the hunt converges (the hunter policy slays it, banks wreck +
      # richer monster crates, and a slain Maw never stirs again), and
      # the slice-6 wind rails: the calm wind term is identically zero
      # and every committed anchor seed is CALM (the pin-carry rule),
      # point-of-sail speed deltas exact at every bearing/trim/weather,
      # duels converge both ways under forced breeze AND gale, and the
      # gale-armed salvage water stays contained — plus the slice-7
      # band rails: band-0 state-identical to bw_duel_init (the
      # pin-carry rule), deeper monotonically harder + richer, reefs
      # laid clear of the anchorage and pier across 4096 seeds, the
      # scrape latch frame-exact (player-only; groundings can sink),
      # band duels converge both ways (band-2 tier-0 losses flip to
      # wins with cannons II), and the band-2 rock water stays
      # contained under adversarial input.
      - name: Brineward host proof (bw_sim mirror)
        run: python3 tools/check-brine.py
