            --assert-watch 250:t:0:eq:0x4252494E \
            --assert-watch 250:t:1:eq:0x57415244 \
            --assert-watch 250:t:3:eq:0 \
            --assert-watch 250:t:2:ge:200
      # Proof 2 — momentum sailing: START latches seed 118; the sloop
