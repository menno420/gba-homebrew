      # SURVIVE) with still no write. START at 3810 is now in winter, so it
      # commits the record ONCE (best t[43]=3003, furthest season t[44]=3, run
      # seed t[45]=1370=UR_SEED, writes t[47]=1). The exported battery carries the
      # record byte-identical to the mirror encode(3003, winter, UR_SEED).
      - name: 'proof 5a — winter-gated save: spring START BLOCKED, winter START commits the REALIZED score 3003 (season 3), battery bytes == mirror encode'
        run: |
          python3 tools/underroot-save.py blank ur-blank.sav
          python3 tools/nds-headless-check.py \
            games/underroot-nds/underroot-nds.nds ur-save-commit.png \
            --frames 3880 --shot 3850:ur-save-committed.png \
            --shot 405:ur-save-spring-blocked.png \
            --touch 60-70:72,24 --touch 75-85:88,24 --touch 90-100:104,24 \
            --touch 105-115:120,24 --touch 120-130:136,24 \
            --touch 135-145:152,24 --touch 150-160:168,24 \
            --touch 165-175:184,24 --touch 180-190:200,24 \
            --touch 195-205:216,24 \
            --keys 210-220:L --touch 210-220:184,24 \
            --keys 225-235:L --touch 225-235:200,24 \
            --keys 240-250:R --touch 240-250:72,24 \
            --keys 255-265:R --touch 255-265:88,24 \
            --keys 270-280:R --touch 270-280:104,24 \
            --keys 320-330:R --touch 320-330:120,24 \
            --keys 335-345:R --touch 335-345:152,24 \
            --keys 350-360:R --touch 350-360:216,24 \
            --keys 395-400:START \
            --keys 3810-3830:START \
            --battery-in ur-blank.sav --battery-out ur-save1.sav \
            --elf games/underroot-nds/build/underroot-nds.elf \
            --watch t:ur_telemetry:54 \
            --assert-watch 250:t:46:eq:0 \
            --assert-watch 250:t:43:eq:0 \
            --assert-watch 250:t:44:eq:0 \
            --assert-watch 250:t:47:eq:0 \
            --assert-watch 250:t:48:eq:1 \
            --assert-watch 390:t:3:eq:0 \
            --assert-watch 390:t:42:eq:2008 \
            --assert-watch 390:t:47:eq:0 \
            --assert-watch 405:t:3:eq:0 \
            --assert-watch 405:t:47:eq:0 \
            --assert-watch 405:t:43:eq:0 \
            --assert-watch 3800:t:3:eq:3 \
            --assert-watch 3800:t:23:eq:21 \
            --assert-watch 3800:t:38:eq:3 \
            --assert-watch 3800:t:42:eq:3003 \
            --assert-watch 3800:t:47:eq:0 \
            --assert-watch 3850:t:43:eq:3003 \
            --assert-watch 3850:t:44:eq:3 \
            --assert-watch 3850:t:45:eq:1370 \
            --assert-watch 3850:t:46:eq:0 \
            --assert-watch 3850:t:47:eq:1
          python3 tools/underroot-save.py expect ur-save1.sav --score 3003 --season 3 --seed 1370
          python3 tools/underroot-save.py inspect ur-save1.sav
      # 5b — power cycle loads the record + an equal WINTER run writes nothing: a
      # fresh boot with 5a's battery loads the record (save-loaded t[46]=1, best
      # 3003, furthest season 3, seed 1370 — on the title BEFORE any input); with
      # the SAME record standing and NO colony dug, the clock runs to WINTER
      # (t[3]=3) and a START at 3810 ties nothing (an empty colony scores 0 in
      # winter, and season 3 == the record's season, so improves = 0), so the
      # commit writes NOTHING (t[47] stays 0 — the wear discipline). The battery
      # image is byte-identical after the run.
      - name: 'proof 5b — save persistence: power cycle loads the record, an equal (empty) winter run writes nothing'
        run: |
          python3 tools/nds-headless-check.py \
            games/underroot-nds/underroot-nds.nds ur-save-reload.png \
            --frames 3880 --keys 3810-3830:START \
            --battery-in ur-save1.sav --battery-out ur-save2.sav \
            --elf games/underroot-nds/build/underroot-nds.elf \
            --watch t:ur_telemetry:54 \
            --assert-watch 250:t:46:eq:1 \
            --assert-watch 250:t:43:eq:3003 \
            --assert-watch 250:t:44:eq:3 \
            --assert-watch 250:t:45:eq:1370 \
            --assert-watch 250:t:47:eq:0 \
            --assert-watch 3800:t:3:eq:3 \
            --assert-watch 3850:t:43:eq:3003 \
            --assert-watch 3850:t:47:eq:0
          cmp ur-save1.sav ur-save2.sav
          echo "battery image byte-identical after the equal winter run"
      # 5c — corrupt save = fresh table + the game plays on; future version =
      # reset (slice 9): a battery image with one flipped bit in the record's
      # checksum word (data intact — only the checksum can reject it) boots to
      # the fresh table with NO crash (magic t[0] alive, frame t[2] running,
      # save-loaded t[46]=0, best t[43]=0); a crafted FUTURE-VERSION record
      # carrying a VALID recomputed checksum (differing only in the version
      # word) ALSO resets to the fresh table — the version gate rejects on its
      # own. Both fixtures are built by tools/underroot-save.py through the
      # check-underroot.py mirror, which asserts they must NOT decode.
      - name: 'proof 5c — corrupt save = fresh table + the game plays on; future version = reset'
        run: |
          python3 tools/underroot-save.py corrupt ur-save1.sav --out ur-corrupt.sav
          python3 tools/nds-headless-check.py \
            games/underroot-nds/underroot-nds.nds ur-save-corrupt.png \
            --frames 300 \
            --battery-in ur-corrupt.sav \
            --elf games/underroot-nds/build/underroot-nds.elf \
            --watch t:ur_telemetry:54 \
            --assert-watch 250:t:0:eq:0x554E4452 \
            --assert-watch 250:t:2:ge:200 \
            --assert-watch 250:t:46:eq:0 \
            --assert-watch 250:t:43:eq:0 \
            --assert-watch 250:t:44:eq:0 \
            --assert-watch 250:t:48:eq:1
          python3 tools/underroot-save.py version-bump ur-save1.sav --out ur-vbump.sav
          python3 tools/nds-headless-check.py \
            games/underroot-nds/underroot-nds.nds ur-save-vbump.png \
            --frames 300 \
            --battery-in ur-vbump.sav \
            --elf games/underroot-nds/build/underroot-nds.elf \
            --watch t:ur_telemetry:54 \
            --assert-watch 250:t:0:eq:0x554E4452 \
            --assert-watch 250:t:46:eq:0 \
            --assert-watch 250:t:43:eq:0 \
            --assert-watch 250:t:48:eq:1
      # Proof 6 — THE SEED DIAL + balance (slice 10): scanning the dial picks a
      # different year seed, and the dialed seed feeds the whole schedule. Two
      # RIGHT presses step the dial 0 -> 1 -> 2 (no touch, so nothing is dug); by
      # frame 250 (still SPRING day 0, t[3]=0) the dial rests at position 2
      # (t[49]=2) whose seed is 2171 (t[50]=2171) — NOT the home UR_SEED — and the
      # meadow's patch-sum has FOLLOWED the new seed to ur_patch_total(2171,
      # spring)=32 (t[16]=32, vs the home seed's 34), the ROM-visible proof that
      # the seed->schedule wiring is live. The reference-plan fairness witness
      # tracks the dialed seed too (t[51]=1 fair, t[52]=35 = the reference winter
      # score for seed 2171) — the ROM-side confirmation of check-underroot.py's
      # prove_balance that every dialable seed is survivable. The distinctness,
      # purity and fairness of ALL dial seeds are proven exhaustively host-side.
      - name: 'proof 6 — seed dial: RIGHT scans to dial 2 (seed 2171), the patch schedule + fairness witness follow the dialed seed'
        run: |
          python3 tools/nds-headless-check.py \
            games/underroot-nds/underroot-nds.nds ur-dial-300.png \
            --frames 300 --shot 240:ur-dial-240.png \
            --keys 60-70:RIGHT \
            --keys 120-130:RIGHT \
            --elf games/underroot-nds/build/underroot-nds.elf \
            --watch t:ur_telemetry:54 \
            --assert-watch 250:t:0:eq:0x554E4452 \
            --assert-watch 250:t:3:eq:0 \
            --assert-watch 250:t:49:eq:2 \
            --assert-watch 250:t:50:eq:2171 \
            --assert-watch 250:t:16:eq:32 \
            --assert-watch 250:t:51:eq:1 \
            --assert-watch 250:t:52:eq:35
      - name: upload Underroot ROM + proof screenshots
        uses: actions/upload-artifact@v4
        with:
